<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Postcove favicon — refined glass box. Rounded tile follows the OS
       light/dark scheme; icy box reads on either. -->
  <style>
    .tile { fill: #0b1322; }
    @media (prefers-color-scheme: light) { .tile { fill: #e9f3fb; } }
  </style>
  <defs>
    <linearGradient id="fv-top" x1="14" y1="12" x2="50" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4fdff"/><stop offset="0.55" stop-color="#cdeffd"/><stop offset="1" stop-color="#a4e0fb"/>
    </linearGradient>
    <linearGradient id="fv-left" x1="10" y1="26" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d6f1fe"/><stop offset="1" stop-color="#7cc6ef"/>
    </linearGradient>
    <linearGradient id="fv-right" x1="32" y1="36" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a3dbf6"/><stop offset="1" stop-color="#4e9ed0"/>
    </linearGradient>
    <linearGradient id="fv-doc" x1="22" y1="2" x2="40" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/><stop offset="1" stop-color="#dcf2ff"/>
    </linearGradient>
    <radialGradient id="fv-glow" cx="0.5" cy="0.46" r="0.5">
      <stop stop-color="#48c6fb" stop-opacity="0.45"/><stop offset="1" stop-color="#48c6fb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect class="tile" width="64" height="64" rx="14"/>
  <ellipse cx="32" cy="31" rx="26" ry="26" fill="url(#fv-glow)"/>

  <path d="M32 12 54 24 32 36 10 24Z" fill="url(#fv-top)"/>
  <path d="M10 24 32 36V56L10 44Z" fill="url(#fv-left)"/>
  <path d="M54 24 32 36V56l22-12Z" fill="url(#fv-right)"/>
  <path d="M10 24 32 12l22 12" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.1" stroke-linejoin="round" fill="none"/>
  <ellipse cx="32" cy="26" rx="11" ry="4.8" fill="#1f5b86" fill-opacity="0.32"/>

  <g transform="translate(20 1) rotate(-14 12 14)">
    <path d="M0 3a3 3 0 0 1 3-3h15.2l5.8 5.8V21a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3Z" fill="url(#fv-doc)" stroke="#eaf8ff" stroke-width="0.7" stroke-linejoin="round"/>
    <path d="M18.2 0v3a3 3 0 0 0 3 3h2.8Z" fill="#c5e9fb"/>
    <rect x="3.8" y="5.6" width="9" height="6.4" rx="1.6" fill="#2aa0e2"/>
    <text x="8.3" y="10.8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="4.8" font-weight="700" fill="#ffffff">AI</text>
    <rect x="3.8" y="15.4" width="16.4" height="1.7" rx="0.85" fill="#86c4e8"/>
    <rect x="3.8" y="18.9" width="16.4" height="1.7" rx="0.85" fill="#86c4e8"/>
    <rect x="3.8" y="22.4" width="10.5" height="1.7" rx="0.85" fill="#86c4e8"/>
  </g>

  <g transform="translate(40.5 34.5)">
    <path d="M2.7 5.2V3.5a2.5 2.5 0 0 1 5 0v1.7" stroke="#eaf8ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="0.5" y="5.2" width="8.9" height="6.8" rx="1.7" fill="#eaf8ff"/>
    <circle cx="4.95" cy="8.3" r="1.05" fill="#5aa6d6"/>
  </g>
</svg>
