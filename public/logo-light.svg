<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Postcove — LIGHT logo. Same glass box, tuned for contrast on a light
       surface: deeper edges, soft ground shadow, no glow. -->
  <defs>
    <linearGradient id="bl-top" x1="14" y1="12" x2="50" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eaf8ff"/><stop offset="0.55" stop-color="#b6e3fa"/><stop offset="1" stop-color="#8fd2f3"/>
    </linearGradient>
    <linearGradient id="bl-left" x1="10" y1="26" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#aeddf9"/><stop offset="1" stop-color="#5fb0e0"/>
    </linearGradient>
    <linearGradient id="bl-right" x1="32" y1="36" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7cc3ed"/><stop offset="1" stop-color="#3f8cc0"/>
    </linearGradient>
    <linearGradient id="bl-doc" x1="22" y1="2" x2="40" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/><stop offset="1" stop-color="#dcefff"/>
    </linearGradient>
    <linearGradient id="bl-lock" x1="40" y1="35" x2="50" y2="47" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/><stop offset="1" stop-color="#d4ecfb"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="32" cy="57" rx="19" ry="3.6" fill="#1e3a5f" fill-opacity="0.16"/>

  <!-- Box -->
  <path d="M32 12 54 24 32 36 10 24Z" fill="url(#bl-top)"/>
  <path d="M10 24 32 36V56L10 44Z" fill="url(#bl-left)"/>
  <path d="M54 24 32 36V56l22-12Z" fill="url(#bl-right)"/>

  <!-- Frost crystals -->
  <path d="M16 30l4 5m-1-2 3 1M44 47l3-6m0 3 2-2" stroke="#ffffff" stroke-opacity="0.5" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Edge definition for light backgrounds -->
  <path d="M10 24 32 12l22 12L32 36Z" stroke="#3f8cc0" stroke-opacity="0.55" stroke-width="0.9" stroke-linejoin="round" fill="none"/>
  <path d="M10 24 32 36 54 24M10 24v20l22 12 22-12V24M32 36v20" stroke="#3f8cc0" stroke-opacity="0.45" stroke-width="0.9" stroke-linejoin="round" fill="none"/>
  <path d="M10 24 32 12l22 12" stroke="#ffffff" stroke-opacity="0.8" stroke-width="1" stroke-linejoin="round" fill="none"/>

  <!-- Slot shadow -->
  <ellipse cx="32" cy="26" rx="11" ry="4.8" fill="#1f5b86" fill-opacity="0.3"/>

  <!-- Document -->
  <g transform="translate(20 1) rotate(-14 12 14)">
    <path d="M0.7 36.5 24.3 36.5" stroke="#1f5b86" stroke-opacity="0.16" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 3a3 3 0 0 1 3-3h15.2l5.8 5.8V21a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3Z" fill="url(#bl-doc)" stroke="#4f9fd0" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M18.2 0v3a3 3 0 0 0 3 3h2.8Z" fill="#bfe6fb"/>
    <rect x="3.8" y="5.6" width="9" height="6.4" rx="1.6" fill="#2499dd"/>
    <text x="8.3" y="10.8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="4.8" font-weight="700" fill="#ffffff">AI</text>
    <rect x="3.8" y="15.4" width="16.4" height="1.7" rx="0.85" fill="#5aa6d6"/>
    <rect x="3.8" y="18.9" width="16.4" height="1.7" rx="0.85" fill="#5aa6d6"/>
    <rect x="3.8" y="22.4" width="10.5" height="1.7" rx="0.85" fill="#5aa6d6"/>
  </g>

  <!-- Lock -->
  <g transform="translate(40.5 34.5)">
    <path d="M2.7 5.2V3.5a2.5 2.5 0 0 1 5 0v1.7" stroke="#3a7aa6" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <rect x="0.5" y="5.2" width="8.9" height="6.8" rx="1.7" fill="url(#bl-lock)" stroke="#7cc3ed" stroke-width="0.6"/>
    <circle cx="4.95" cy="8.3" r="1.05" fill="#4f9fd0"/>
  </g>
</svg>
